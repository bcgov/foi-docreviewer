name: CI - Dynamic Service Image Builder

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
      - ready_for_review

  workflow_dispatch:
    inputs:
      service:
        description: "Service name to build (or 'all')"
        required: false
        default: all

      image_tag:
        description: "Image tag to publish"
        required: true


# Image tagging strategy:
# - Pull Requests: use PR number as immutable preview tag
# - Manual runs: use provided image tag
env:
  IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || github.event.pull_request.number }}


jobs:

  generate-build-matrix:

    name: Detect Services Requiring Build
    
    permissions:
      contents: read
      
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq


      - name: Generate service build matrix
        id: generate-matrix
        shell: bash
        run: |

          CONFIG_FILE=".github/configuration/service-catalog.yaml"


          #
          # Manual execution:
          # Build either:
          #   - all services
          #   - a single selected service
          #
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then

            REQUESTED_SERVICE="${{ github.event.inputs.service }}"

            if [ "$REQUESTED_SERVICE" = "all" ]; then

              BUILD_MATRIX=$(yq -o=json '.services | {include: .}' "$CONFIG_FILE")

            else

              BUILD_MATRIX=$(yq -o=json \
                ".services | map(select(.name == \"$REQUESTED_SERVICE\")) | {include: .}" \
                "$CONFIG_FILE")

            fi


          #
          # Pull request execution:
          # Identify services affected by changed files.
          #
          else

            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

            echo "Changed files:"
            echo "$CHANGED_FILES"


            BUILD_MATRIX='{"include":['
            FIRST_ENTRY=true


            SERVICE_COUNT=$(yq '.services | length' "$CONFIG_FILE")


            for ((index=0; index<SERVICE_COUNT; index++))
            do

              SERVICE_NAME=$(yq ".services[$index].name" "$CONFIG_FILE")
              SERVICE_PATH=$(yq ".services[$index].path" "$CONFIG_FILE")
              IMAGE_NAME=$(yq ".services[$index].image" "$CONFIG_FILE")


              # Add service to build list if code changes exist under its directory
              if echo "$CHANGED_FILES" | grep -q "^${SERVICE_PATH}/"; then


                if [ "$FIRST_ENTRY" = false ]; then
                  BUILD_MATRIX+=","
                fi


                BUILD_MATRIX+="{\"name\":\"${SERVICE_NAME}\",\"path\":\"${SERVICE_PATH}\",\"image\":\"${IMAGE_NAME}\"}"

                FIRST_ENTRY=false

              fi

            done


            BUILD_MATRIX+=']}'

          fi


          echo "Build matrix:"
          echo "$BUILD_MATRIX" | jq .


          echo "matrix=$(echo "$BUILD_MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"



  build-and-push-images:

    name: Build and Push ${{ matrix.name }}

    permissions:
      contents: read
      
    needs: generate-build-matrix

    if: ${{ fromJson(needs.generate-build-matrix.outputs.matrix).include[0] != null }}

    runs-on: ubuntu-latest


    strategy:
      fail-fast: false

      # Prevent registry/API overload when multiple services build together.
      # Increase only after validating OpenShift registry capacity.
      max-parallel: 3

      matrix:
        include: ${{ fromJson(needs.generate-build-matrix.outputs.matrix).include }}


    steps:


      - name: Checkout repository
        uses: actions/checkout@v6



      - name: Login to OpenShift registry
        shell: bash
        env:
          REGISTRY: ${{ secrets.PUBLIC_IMAGE_REPOSITORY }}
          USERNAME: ${{ secrets.OPENSHIFT_SA_NAME }}
          PASSWORD: ${{ secrets.OPENSHIFT_SA_TOOLS_TOKEN }}
        run: |

          MAX_RETRIES=5

          # Random startup delay to avoid multiple matrix jobs hitting the registry simultaneously
          STARTUP_DELAY=$((RANDOM % 30))
          echo "Waiting ${STARTUP_DELAY}s before registry login to avoid connection spikes..."
          sleep "$STARTUP_DELAY"

          # WARM UP CONNECTION: Ensure TLS/TCP route is open & responsive
          echo "Warming up connection to https://$REGISTRY/v2/..."
          for i in {1..3}; do
            HTTP_CODE=$(curl -s -k --connect-timeout 5 -o /dev/null -w "%{http_code}" "https://$REGISTRY/v2/" || echo "FAILED")
            echo "Warmup ping $i: HTTP $HTTP_CODE"
            
            # 401 means OpenShift registry replied instantly
            if [ "$HTTP_CODE" = "401" ] then
              echo "OpenShift Registry is online and responsive."
              break
            fi
            sleep 2
          done

          for attempt in $(seq 1 $MAX_RETRIES)
          do
            echo "Registry login attempt ${attempt}/${MAX_RETRIES}"

            LOGIN_OUTPUT=$(printf '%s\n' "$PASSWORD" | docker login "$REGISTRY" --username "$USERNAME" --password-stdin 2>&1)
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Registry login successful"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              RETRY_DELAY_SECONDS=$((15 * 2 ** (attempt - 1)))

              echo "Registry login failed. Retrying in ${RETRY_DELAY_SECONDS}s..."
              sleep "$RETRY_DELAY_SECONDS"
            fi
          done

          echo "Unable to authenticate with OpenShift registry after ${MAX_RETRIES} attempts"
          exit 1

      - name: Build container image
        working-directory: ./${{ matrix.path }}
        env:
          REGISTRY: ${{ secrets.PUBLIC_IMAGE_REPOSITORY }}
          NAMESPACE: ${{ secrets.OPENSHIFT_TOOLS_NAMESPACE }}
        run: |

          IMAGE="$REGISTRY/$NAMESPACE/${{ matrix.image }}:${{ env.IMAGE_TAG }}"

          docker build \
            --tag "$IMAGE" \
            .



      - name: Push container image
        shell: bash
        env:
          REGISTRY: ${{ secrets.PUBLIC_IMAGE_REPOSITORY }}
          NAMESPACE: ${{ secrets.OPENSHIFT_TOOLS_NAMESPACE }}
        run: |

          MAX_RETRIES=5

          IMAGE="$REGISTRY/$NAMESPACE/${{ matrix.image }}:${{ env.IMAGE_TAG }}"

          # Random startup delay to prevent multiple matrix jobs pushing simultaneously
          STARTUP_DELAY=$((RANDOM % 30))

          echo "Service ${{ matrix.name }} waiting ${STARTUP_DELAY}s before image push..."
          sleep "$STARTUP_DELAY"

          for attempt in $(seq 1 $MAX_RETRIES)
          do
            echo "Push attempt ${attempt}/${MAX_RETRIES}: ${IMAGE}"

            if docker push "$IMAGE"; then
              echo "Image push successful"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              RETRY_DELAY_SECONDS=$((15 * 2 ** (attempt - 1)))

              echo "Image push failed. Retrying in ${RETRY_DELAY_SECONDS}s..."
              sleep "$RETRY_DELAY_SECONDS"
            fi
          done

          echo "Unable to push image after ${MAX_RETRIES} attempts"
          exit 1



  notify-pr:
    name: Report Build Result

    if: github.event_name == 'pull_request'

    needs: build-and-push-images

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add build summary comment
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b
        with:
          message: |
            ✅ Container images built successfully.

            **Image tag:** `${{ env.IMAGE_TAG }}`

apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: ${NAME}
  labels:
    app: ${NAME}
    name: ${NAME}
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: ${NAME}
    stringData:
      POSTGRES_URL: "${POSTGRES_URL}"
      REDIS_ADDR: "${REDIS_ADDR}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      S3_ENDPOINT: "${S3_ENDPOINT}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      S3_PUBLIC_URL: "${S3_PUBLIC_URL}"
      SITEMAP_OPENINFO_BUCKET: "${SITEMAP_OPENINFO_BUCKET}"
      SITEMAP_OPENINFO_PREFIX: "${SITEMAP_OPENINFO_PREFIX}"
      SITEMAP_OPENINFO_PUBLIC_BASE_URL: "${SITEMAP_OPENINFO_PUBLIC_BASE_URL}"
      SITEMAP_PD_BUCKET: "${SITEMAP_PD_BUCKET}"
      SITEMAP_PD_PREFIX: "${SITEMAP_PD_PREFIX}"
      SITEMAP_PD_PUBLIC_BASE_URL: "${SITEMAP_PD_PUBLIC_BASE_URL}"
      SOURCE_ALLOWLIST: "${SOURCE_ALLOWLIST}"
      SITEMAP_SOURCE_ALLOWLIST: "${SITEMAP_SOURCE_ALLOWLIST}"
    type: Opaque

parameters:
  - name: NAME
    description: The name for all created objects.
    required: true
    value: publication-service-secret
  - name: POSTGRES_URL
    description: pgx-compatible PostgreSQL DSN used by publication-service.
    required: true
  - name: REDIS_ADDR
    description: Redis address in host:port form. Prefer a stable service DNS name such as redis.<namespace>.svc.cluster.local:6379 instead of a raw ClusterIP.
    required: true
  - name: REDIS_PASSWORD
    description: Redis password. Leave blank only when Redis auth is disabled.
    required: false
  - name: S3_ENDPOINT
    description: S3-compatible endpoint URL.
    required: true
  - name: S3_ACCESS_KEY_ID
    description: S3 access key ID.
    required: true
  - name: S3_SECRET_ACCESS_KEY
    description: S3 secret access key.
    required: true
  - name: S3_PUBLIC_URL
    description: Public-facing S3 base URL used for generated publication links.
    required: true
  - name: SITEMAP_OPENINFO_BUCKET
    description: Bucket containing OpenInfo sitemap XML.
    required: true
  - name: SITEMAP_OPENINFO_PREFIX
    description: Key prefix for OpenInfo sitemap XML.
    required: true
    value: openinfopub/sitemap/
  - name: SITEMAP_OPENINFO_PUBLIC_BASE_URL
    description: Public URL prefix for OpenInfo sitemap page files.
    required: true
  - name: SITEMAP_PD_BUCKET
    description: Bucket containing Proactive Disclosure sitemap XML.
    required: true
  - name: SITEMAP_PD_PREFIX
    description: Key prefix for Proactive Disclosure sitemap XML.
    required: true
    value: proactivedisclosure/sitemap/
  - name: SITEMAP_PD_PUBLIC_BASE_URL
    description: Public URL prefix for Proactive Disclosure sitemap page files.
    required: true
  - name: SOURCE_ALLOWLIST
    description: Comma-separated source values accepted by publish validators.
    required: true
    value: openinfo.enqueue.service,openinfo.publish.service,proactivedisclosure.enqueue.service,proactivedisclosure.publish.service
  - name: SITEMAP_SOURCE_ALLOWLIST
    description: Comma-separated source values accepted by sitemap validators.
    required: true
    value: openinfo.workflow.service,proactivedisclosure.workflow.service
